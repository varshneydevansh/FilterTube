      <h3 class="style-scope ytd-playlist-panel-renderer">

          class="title style-scope ytd-playlist-panel-renderer"

      <div id="publisher-container" class="style-scope ytd-playlist-panel-renderer">
        <yt-formatted-string
          class="byline-title style-scope ytd-playlist-panel-renderer"
          hidden=""
          title="Mix &#8211; Shakira , Ed Sheeran,  Be&#233;le Hips Don't Lie (Spotify Anniversary)">Mix &#8211; Shakira , Ed Sheeran,  Be&#233;le Hips Don't Lie (Spotify Anniversary)</yt-formatted-string>

    </div>
  </div>
